name: validate-skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Every SKILL.md has name + description frontmatter
        run: |
          set -e
          fail=0
          for f in skills/*/SKILL.md; do
            echo "checking $f"
            # must start with a YAML frontmatter block
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::missing opening frontmatter ---"; fail=1; continue
            fi
            fm="$(awk 'NR>1 && /^---$/{exit} NR>1{print}' "$f")"
            echo "$fm" | grep -q '^name:' || { echo "::error file=$f::missing name:"; fail=1; }
            echo "$fm" | grep -q '^description:' || { echo "::error file=$f::missing description:"; fail=1; }
          done
          exit $fail

      - name: Every skill ships a verifiable done-criterion
        run: |
          set -e
          fail=0
          for f in skills/*/SKILL.md; do
            grep -q '✅' "$f" || { echo "::error file=$f::no ✅ done-criterion found"; fail=1; }
          done
          exit $fail

  # test-is-truth applied to the repo itself: the demo invariants are asserted
  # by running the REAL test (test.mjs) and checking its real exit code, not by
  # trusting run-demo.sh narration. The buggy impl MUST fail; the fixed MUST pass.
  demo-invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Buggy impl must FAIL (exit non-zero)
        run: |
          if node demo/test.mjs demo/src/parse-price.mjs; then
            echo "::error::buggy parse-price unexpectedly PASSED — the test no longer catches the bug"
            exit 1
          fi
          echo "OK: buggy impl failed as expected"

      - name: Fixed impl must PASS (exit zero)
        run: node demo/test.mjs demo/src/parse-price.fixed.mjs
